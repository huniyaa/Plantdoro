<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plantdoro – Cultivate Your Attention Span</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kirang+Haerang&display=swap" rel="stylesheet">
  <script type="module" src="https://unpkg.com/@splinetool/viewer@1.12.81/build/spline-viewer.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --g-dark:   #1a3a1a;
      --g-mid:    #2d5a1b;
      --g-light:  #4a8c2a;
      --g-bright: #5aaa30;
      --brown:    #a04020;
      --bg:       #f0f5f0;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: 'Kirang Haerang', cursive;
    }

    /* ── Wood-grain canvas sits behind everything ── */
    #grain {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Screens ── */
    .screen {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.45s ease;
      z-index: 1;
    }
    .screen.active { opacity: 1; pointer-events: all; }

    /* ───────────────────────────────────────────────
       LANDING
    ─────────────────────────────────────────────── */
    .land-wrap {
      width: min(920px, 90vw);
      display: flex; flex-direction: column;
      gap: 0;
    }

    .tagline {
      font-size: clamp(1.1rem, 2vw, 1.6rem);
      color: var(--g-mid);
      letter-spacing: 0.04em;
      margin-bottom: 4px;
      opacity: 0; animation: slideUp 0.6s 0.1s ease forwards;
    }

    .title-row {
      display: flex; align-items: center; gap: 16px;
      margin-bottom: 44px;
      opacity: 0; animation: slideUp 0.6s 0.22s ease forwards;
    }

    .logo {
      font-family: 'Kirang Haerang', cursive;
      font-size: clamp(4.5rem, 9vw, 8.5rem);
      line-height: 1; user-select: none;
      letter-spacing: -0.01em;
    }
    .logo .pl  { color: #4a8c2a; }
    .logo .dk  { color: #1a3a1a; }

    .land-btn {
      opacity: 0; animation: slideUp 0.6s 0.34s ease forwards;
    }

    /* ───────────────────────────────────────────────
       SHARED BUTTON
    ─────────────────────────────────────────────── */
    .btn {
      font-family: 'Kirang Haerang', cursive; font-weight: 700;
      font-size: clamp(1.1rem, 2vw, 1.6rem);
      color: #fff; background: var(--g-dark);
      border: none; border-radius: 60px;
      padding: 16px 36px; cursor: pointer;
      letter-spacing: 0.04em;
      box-shadow: 0 4px 22px rgba(26,58,26,.28);
      transition: transform .15s, box-shadow .15s;
      width: 100%;
    }
    .btn:hover  { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(26,58,26,.38); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: .5; cursor: default; transform: none; }

    /* ───────────────────────────────────────────────
       PLANT SELECTION
    ─────────────────────────────────────────────── */
    .pick-card {
      background: rgba(250,253,250,.96);
      border: 4px solid var(--g-dark);
      border-radius: 18px;
      outline: 4px solid var(--g-dark);
      outline-offset: -10px;
      padding: clamp(28px,5vw,60px) clamp(24px,6vw,70px);
      width: min(820px, 92vw);
      box-shadow: inset 0 0 0 3px rgba(26,58,26,.12);
    }

    .pick-title {
      font-family: 'Kirang Haerang', cursive; font-size: clamp(2rem,3.5vw,2.8rem);
      color: var(--g-dark); text-align: center;
      margin-bottom: clamp(24px,4vw,44px);
    }

    .plants-row {
      display: flex; justify-content: space-around;
      gap: 16px; flex-wrap: wrap;
    }

    .p-opt {
      display: flex; flex-direction: column;
      align-items: center; gap: 14px;
      padding: 12px 16px; border-radius: 14px;
      cursor: pointer;
      transition: transform .2s, background .2s;
    }
    .p-opt:hover { transform: translateY(-5px); background: rgba(74,140,42,.1); }
    .p-opt.locked { cursor: default; filter: grayscale(.1); }
    .p-opt.locked:hover { transform: none; background: none; }

    .p-name {
      font-family: 'Kirang Haerang', cursive; font-weight: 700;
      font-size: clamp(1.2rem,2.2vw,1.6rem); color: var(--g-dark);
    }

    /* ───────────────────────────────────────────────
       TIMER SCREEN
    ─────────────────────────────────────────────── */
    #screen-timer {
      align-items: stretch;
      justify-content: flex-start;
    }

    .t-header {
      flex-shrink: 0;
      padding: clamp(12px,2vw,22px) clamp(20px,3vw,36px) 0;
    }
    .t-logo {
      font-family: 'Kirang Haerang', cursive;
      font-size: clamp(1.9rem,3.5vw,2.9rem); line-height: 1;
    }
    .t-logo .pl { color: var(--g-light); }
    .t-logo .dk { color: var(--g-dark); }
    .t-sub { font-size: clamp(.9rem,1.5vw,1.2rem); color: var(--g-mid); margin-top: 2px; }

    .t-body {
      flex: 1; min-height: 0;
      display: flex; align-items: center;
      padding: clamp(12px,2vw,24px) clamp(20px,3vw,40px) clamp(16px,2.5vw,30px);
      gap: clamp(24px,4vw,48px);
    }

    /* Spline side */
    .spline-wrap {
      flex: 0 0 58%;
      height: 100%;
      position: relative;
      border-radius: 16px;
      overflow: hidden;
    }

    spline-viewer {
      width: 100%; height: 100%;
      display: block;
    }

    /* Blocker overlay – active by default (blocks clicks) */
    #blocker {
      position: absolute; inset: 0; z-index: 10;
      background: transparent;
      cursor: not-allowed;
      transition: opacity .3s;
    }
    #blocker.off {
      pointer-events: none;
      opacity: 0;
    }

    /* Water-now badge */
    #water-badge {
      position: absolute; top: 14px; left: 50%;
      transform: translateX(-50%);
      background: var(--g-dark); color: #fff;
      font-family: 'Kirang Haerang', cursive; font-weight: 700;
      font-size: clamp(.8rem,1.5vw,1.05rem);
      padding: 7px 20px; border-radius: 50px;
      z-index: 20; pointer-events: none;
      white-space: nowrap;
      opacity: 0; transition: opacity .3s;
    }
    #water-badge.show {
      opacity: 1;
      animation: pulseBadge 1.4s ease-in-out infinite;
    }
    @keyframes pulseBadge {
      0%,100% { transform: translateX(-50%) scale(1); }
      50%      { transform: translateX(-50%) scale(1.06); }
    }

    /* Controls side */
    .ctrl {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; gap: clamp(14px,2.5vw,22px);
    }

    #t-display {
      font-family: 'Kirang Haerang', cursive;
      font-size: clamp(5rem,10vw,9rem);
      color: var(--g-dark); line-height: 1;
      letter-spacing: -.01em;
    }

    .bar-wrap {
      width: 100%; height: 16px;
      background: #fff;
      border-radius: 8px;
      border: 2.5px solid var(--g-dark);
      overflow: hidden;
    }
    #bar-fill {
      height: 100%;
      background: var(--g-dark);
      border-radius: 6px;
      width: 100%;
      transition: width 1s linear;
    }

    #start-btn { max-width: 300px; font-size: clamp(1.2rem,2.3vw,1.7rem); }

    #mode-btn {
      font-family: 'Kirang Haerang', cursive;
      font-size: clamp(.9rem,1.5vw,1.1rem);
      color: var(--g-mid); background: none;
      border: 1.5px dashed var(--g-mid);
      border-radius: 20px; padding: 4px 14px;
      cursor: pointer; transition: background .2s;
    }
    #mode-btn:hover { background: rgba(74,140,42,.08); }

    .stage-txt {
      font-size: clamp(1.05rem,1.8vw,1.25rem);
      color: var(--g-mid);
    }
    .stage-txt span { color: var(--g-dark); font-weight: 700; }

    /* ───────────────────────────────────────────────
       COMPLETION OVERLAY
    ─────────────────────────────────────────────── */
    #completion {
      display: none; position: fixed; inset: 0;
      z-index: 200;
      background: rgba(10,30,10,.88);
      align-items: center; justify-content: center;
      flex-direction: column; gap: 20px;
      text-align: center;
    }
    #completion.show { display: flex; animation: fadeIn .5s ease; }

    .comp-icon { font-size: clamp(3rem,8vw,5.5rem); }
    .comp-title {
      font-family: 'Kirang Haerang', cursive;
      font-size: clamp(2.2rem,4.5vw,3.5rem); color: #fff;
    }
    .comp-sub {
      font-size: clamp(1.1rem,2vw,1.5rem);
      color: rgba(255,255,255,.82);
      max-width: 420px;
    }
    .btn-light {
      font-family: 'Kirang Haerang', cursive; font-weight: 700;
      font-size: clamp(.95rem,1.8vw,1.2rem);
      color: var(--g-dark); background: #fff;
      border: none; border-radius: 50px;
      padding: 12px 32px; cursor: pointer;
      margin-top: 6px;
      transition: transform .15s;
    }
    .btn-light:hover { transform: scale(1.05); }

    /* ── keyframes ── */
    @keyframes slideUp {
      from { transform: translateY(28px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    @keyframes fadeIn {
      from { opacity: 0 } to { opacity: 1 }
    }
  </style>
</head>

    <div class="ctrl">
      <div id="t-display">0:05</div>

      <div class="bar-wrap">
        <div id="bar-fill"></div>
      </div>

      <button id="start-btn" class="btn" onclick="toggleTimer()">Start</button>

      <button id="mode-btn" onclick="toggleMode()">Mode: Testing (5s)</button>

      <div class="stage-txt">
        Stage: <span id="stage-num">0</span> / 6
      </div>
    </div>

  </div>
</div>

<!-- ═══════════════════════════════════════════════
     COMPLETION OVERLAY
═══════════════════════════════════════════════ -->
<div id="completion">
  <div class="comp-icon">🌿</div>
  <div class="comp-title">Plant Fully Grown!</div>
  <div class="comp-sub">You've completed all 6 intervals. Incredible focus!</div>
  <button class="btn-light" onclick="resetApp()">Grow Another Plant</button>
</div>


<script>
/* ════════════════════════════════════════════════
   WOOD-GRAIN BACKGROUND
════════════════════════════════════════════════ */
(function(){
  const c = document.getElementById('grain');
  const ctx = c.getContext('2d');
  function draw(){
    c.width  = window.innerWidth;
    c.height = window.innerHeight;
    const W = c.width, H = c.height;
    ctx.fillStyle = '#f0f5f0';
    ctx.fillRect(0,0,W,H);
    const lines = 110;
    for(let i=0;i<lines;i++){
      const baseY = (i/lines)*H;
      const alpha = 0.04 + Math.random()*0.11;
      const lw    = 0.4  + Math.random()*0.7;
      ctx.beginPath();
      let x=0, y=baseY+(Math.random()-0.5)*6;
      ctx.moveTo(x,y);
      while(x < W){
        const nx = x + 40 + Math.random()*30;
        const ny = baseY
          + Math.sin(nx*0.018 + i*1.1)*( 2+Math.random()*3 )
          + Math.sin(nx*0.007 + i*0.4)*( 1+Math.random()*2 );
        ctx.quadraticCurveTo(x+(nx-x)*0.5, y+(Math.random()-0.5)*5, nx, ny);
        x=nx; y=ny;
      }
      ctx.strokeStyle=`rgba(120,160,130,${alpha})`;
      ctx.lineWidth=lw;
      ctx.stroke();
    }
  }
  draw();
  window.addEventListener('resize',draw);
})();

/* ════════════════════════════════════════════════
   APP STATE
════════════════════════════════════════════════ */
const MODES = { test: 5, full: 1800 };
let mode            = 'test';
let totalSecs       = MODES[mode];
let remainingSecs   = totalSecs;
let timerRunning    = false;
let timerInterval   = null;
let canWater        = false;
let stage           = 0;

/* ════════════════════════════════════════════════
   SCREEN NAVIGATION
════════════════════════════════════════════════ */
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
}

function selectPlant(name){
  if(!name) return;
  showScreen('timer');
  hardReset();
}

/* keyboard support for plant cards */
document.querySelectorAll('.p-opt:not(.locked)').forEach(el=>{
  el.addEventListener('keydown',e=>{
    if(e.key==='Enter'||e.key===' ') el.click();
  });
});

/* ════════════════════════════════════════════════
   TIMER
════════════════════════════════════════════════ */
function fmt(s){
  if(mode==='test') return `0:${String(s).padStart(2,'0')}`;
  const m = Math.floor(s/60);
  return `${m}:${String(s%60).padStart(2,'0')}`;
}

function updateUI(){
  document.getElementById('t-display').textContent = fmt(remainingSecs);
  document.getElementById('bar-fill').style.width  = (remainingSecs/totalSecs*100)+'%';
}

function toggleTimer(){
  if(canWater) return;        // must water first
  timerRunning ? pause() : start();
}

function start(){
  timerRunning=true;
  document.getElementById('start-btn').textContent='Pause';
  timerInterval=setInterval(()=>{
    remainingSecs--;
    updateUI();
    if(remainingSecs<=0){
      clearInterval(timerInterval);
      timerRunning=false;
      remainingSecs=0;
      updateUI();
      onIntervalEnd();
    }
  },1000);
}

function pause(){
  timerRunning=false;
  clearInterval(timerInterval);
  document.getElementById('start-btn').textContent='Resume';
}

function onIntervalEnd(){
  canWater=true;
  document.getElementById('start-btn').textContent='Start';
  setWatering(true);
}

function hardReset(){
  clearInterval(timerInterval);
  timerRunning=false;
  canWater=false;
  remainingSecs=totalSecs;
  updateUI();
  document.getElementById('start-btn').textContent='Start';
  setWatering(false);
}

/* ════════════════════════════════════════════════
   WATERING INTERACTION
════════════════════════════════════════════════ */
function setWatering(on){
  const bl = document.getElementById('blocker');
  const bk = document.getElementById('water-badge');
  if(on){ bl.classList.add('off'); bk.classList.add('show'); }
  else  { bl.classList.remove('off'); bk.classList.remove('show'); }
}

// Detect any click that reaches the Spline viewer
// (when blocker is .off its pointer-events=none so clicks pass through)
document.getElementById('blocker').closest('.spline-wrap')
  .addEventListener('click', ()=>{
    if(!canWater) return;
    water();
  });

function water(){
  if(!canWater) return;
  canWater=false;
  stage++;
  document.getElementById('stage-num').textContent=stage;
  setWatering(false);

  if(stage>=6){
    setTimeout(()=>document.getElementById('completion').classList.add('show'),900);
  } else {
    remainingSecs=totalSecs;
    updateUI();
    document.getElementById('start-btn').textContent='Start';
  }
}

/* ════════════════════════════════════════════════
   MODE TOGGLE
════════════════════════════════════════════════ */
function toggleMode(){
  mode = mode==='test' ? 'full' : 'test';
  totalSecs = MODES[mode];
  document.getElementById('mode-btn').textContent =
    mode==='test' ? 'Mode: Testing (5s)' : 'Mode: Full (30min)';
  hardReset();
}

/* ════════════════════════════════════════════════
   RESET
════════════════════════════════════════════════ */
function resetApp(){
  stage=0;
  document.getElementById('stage-num').textContent='0';
  document.getElementById('completion').classList.remove('show');
  hardReset();
  showScreen('plants');
}

// Init
updateUI();
</script>
</body>
</html>
